services:
  # ─── Django Backend ───────────────────────────────────────────────────────────
  - type: web
    name: resumeai-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    # Use "bash build.sh" to avoid needing execute permissions on build.sh
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn resumebuilder.wsgi --log-file -"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "resumeai-backend.onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://resumeai-frontend.onrender.com"
      - key: GEMINI_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: resumeai-db
          property: connectionString

  # ─── React Frontend (Static Site) ────────────────────────────────────────────
  - type: web
    name: resumeai-frontend
    env: static
    rootDir: resume-builder
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    # SPA fallback: serve index.html for all routes so HashRouter works correctly
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://resume-builder-ntd7.onrender.com/api"

databases:
  - name: resumeai-db
    plan: free
    region: oregon
