name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: resume-builder/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: resume-builder

      - name: Build for GitHub Pages
        run: npm run build
        working-directory: resume-builder
        env:
          # Set this to /your-repo-name/ in GitHub repository secrets
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
          # Set this to your Render backend URL
          VITE_API_URL: ${{ vars.VITE_API_URL || '' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: resume-builder/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
